{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}Secret Server{{end}}</title>
    <style>
        :root {
            --bg: #fff;
            --fg: #111;
            --muted: #666;
            --border: #ddd;
            --bg-alt: #f5f5f5;
            --accent: #0066cc;
            --accent-hover: #0052a3;
            --danger: #cc0000;
            --danger-hover: #a30000;
            --success: #007a33;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --fg: #e0e0e0;
                --muted: #999;
                --border: #333;
                --bg-alt: #222;
                --accent: #4da6ff;
                --accent-hover: #80bfff;
                --danger: #ff4d4d;
                --danger-hover: #ff8080;
                --success: #4dcc80;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
        }
        nav {
            background: var(--bg-alt);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        nav a {
            color: var(--fg);
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover { color: var(--accent); }
        nav .brand { font-weight: 700; margin-right: auto; }
        main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td {
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        th { font-weight: 600; color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover td { background: var(--bg-alt); }
        a { color: var(--accent); }
        a:hover { color: var(--accent-hover); }
        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--fg);
            text-decoration: none;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .btn:hover { background: var(--bg-alt); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
        form.inline { display: inline; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.25rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--fg);
            font-size: 0.95rem;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
        }
        .actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .filter-form { display: flex; gap: 0.5rem; align-items: end; }
        .filter-form .form-group { margin-bottom: 0; }
        .filter-form input { width: 150px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }
        .stat-card .label { font-size: 0.85rem; color: var(--muted); }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .secret-value { font-family: monospace; }
        .error { background: var(--danger); color: #fff; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .empty { color: var(--muted); text-align: center; padding: 2rem; }
    </style>
</head>
<body>
<nav>
    <a href="/ui/" class="brand">Secret Server</a>
    <a href="/ui/secrets">Secrets</a>
    <a href="/ui/policies">Policies</a>
    <a href="/ui/audit">Audit Log</a>
</nav>
<main>
{{end}}

{{define "foot"}}
</main>
</body>
</html>
{{end}}
