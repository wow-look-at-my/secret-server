{{template "head" .}}
{{define "title"}}{{if .IsNew}}New Secret{{else}}Edit Secret{{end}} - Secret Server{{end}}

<h1>{{if .IsNew}}New Secret{{else}}Edit Secret{{end}}</h1>

{{if .Error}}<div class="error">{{.Error}}</div>{{end}}

<form method="post" action="{{if .IsNew}}{{prefix}}/secrets{{else}}{{prefix}}/secrets/{{.Secret.ID}}{{end}}">
    <div class="form-group">
        <label for="key">Key</label>
        <input type="text" id="key" name="key" required
            value="{{if .IsNew}}{{else}}{{.Secret.Key}}{{end}}"
            placeholder="e.g. DATABASE_URL">
    </div>

    <div class="form-group">
        <label for="value">Value</label>
        <div style="position:relative;">
            <input type="password" id="value" name="value" {{if .IsNew}}required{{end}}
                value="{{if .IsNew}}{{else}}{{.Secret.Value}}{{end}}"
                placeholder="Secret value">
            <button type="button" class="btn btn-sm" onclick="toggleValue()" style="position:absolute; right:4px; top:4px;">Show</button>
        </div>
    </div>

    <div class="form-group">
        <label for="project">Project</label>
        <input type="text" id="project" name="project" required
            value="{{if .IsNew}}{{else}}{{.Secret.Project}}{{end}}"
            placeholder="e.g. myapp">
    </div>

    <div class="form-group">
        <label for="environment">Environment</label>
        <input type="text" id="environment" name="environment" required
            value="{{if .IsNew}}{{else}}{{.Secret.Environment}}{{end}}"
            placeholder="e.g. prod">
    </div>

    <div class="actions">
        <button type="submit" class="btn btn-primary">{{if .IsNew}}Create{{else}}Update{{end}}</button>
        <a href="{{prefix}}/secrets" class="btn">Cancel</a>
    </div>
</form>

<script>
function toggleValue() {
    var el = document.getElementById('value');
    var btn = el.parentElement.querySelector('button');
    if (el.type === 'password') {
        el.type = 'text';
        btn.textContent = 'Hide';
    } else {
        el.type = 'password';
        btn.textContent = 'Show';
    }
}
</script>

{{template "foot" .}}
