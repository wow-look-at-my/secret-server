services:
  secret-server:
    container_name: secret-server
    build:
      context: .
      dockerfile_inline: |
        FROM --platform=$BUILDPLATFORM golang:1.24 AS builder
        WORKDIR /src
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        ARG TARGETOS
        ARG TARGETARCH
        RUN CGO_ENABLED=0 GOOS=${TARGETOS} GOARCH=${TARGETARCH} \
            go build -ldflags="-s -w" -o /secret-server ./cmd/server
        FROM gcr.io/distroless/static-debian12
        COPY --from=builder /secret-server /secret-server
        ENTRYPOINT ["/secret-server"]
    volumes:
      - data:/data
    environment:
      - LISTEN_ADDR=:8080
      - DATABASE_PATH=/data/secrets.db
      - AUDIT_DATABASE_PATH=/data/audit.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_ADMIN_AUDIENCE=${CF_ACCESS_ADMIN_AUDIENCE}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - LOG_LEVEL=info
    networks:
      - nas-public-network

volumes:
  data:

networks:
  nas-public-network:
    external: true
