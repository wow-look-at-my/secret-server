services:
  secret-server:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.24 AS builder
        WORKDIR /src
        COPY go.mod go.sum ./
        RUN go mod download
        COPY . .
        RUN CGO_ENABLED=0 go build -ldflags="-s -w" -o /secret-server ./cmd/server
        FROM gcr.io/distroless/static-debian12
        COPY --from=builder /secret-server /secret-server
        ENTRYPOINT ["/secret-server"]
    ports:
      - "8080:8080"
    volumes:
      - data:/data
    environment:
      - LISTEN_ADDR=:8080
      - DATABASE_PATH=/data/secrets.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_AUDIENCE=${CF_ACCESS_AUDIENCE}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - LOG_LEVEL=info

volumes:
  data:
