name: Docker

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/wow-look-at-my/secret-server
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'DOCKERFILE'
          FROM --platform=$BUILDPLATFORM golang:1.24 AS builder
          WORKDIR /src
          COPY go.mod go.sum ./
          RUN --mount=type=secret,id=github_token \
              git config --global url."https://$(cat /run/secrets/github_token)@github.com/".insteadOf "https://github.com/" && \
              go mod download && \
              git config --global --unset-all url."https://$(cat /run/secrets/github_token)@github.com/".insteadOf
          COPY . .
          ARG TARGETOS
          ARG TARGETARCH
          RUN CGO_ENABLED=0 GOOS=${TARGETOS} GOARCH=${TARGETARCH} \
              go build -ldflags="-s -w" -o /secret-server ./cmd/server
          FROM gcr.io/distroless/static-debian12
          COPY --from=builder /secret-server /secret-server
          ENTRYPOINT ["/secret-server"]
          DOCKERFILE

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            "github_token=${{ secrets.PRIVATE_ORG_REPO_READ }}"
